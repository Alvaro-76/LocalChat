<!DOCTYPE html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #F2F3F7;
        --sidebar-bg: #E8E9F0;
        --surface: #FFFFFF;
        --surface-hover: #F0F1F6;
        --surface-active: #E8EDFF;
        --text: #1A1A2E;
        --text-secondary: #6E6F84;
        --text-muted: #9EA0B4;
        --border: #DCDEE8;
        --border-light: #EBECF2;
        --primary: #4F6CF7;
        --secondary: #6B7B8D;
        --accent: #4F6CF7;
        --accent-light: #E8EDFF;
        --bubble-own: #EDF2FF;
        --bubble-own-border: #D6E0FF;
        --bubble-other: #FFFFFF;
        --bubble-other-border: #DCDEE8;
        --input-bg: #F0F1F6;
        --danger: #E85656;
        --success: #22B05E;
        --online-dot: #22B05E;
        --shadow: rgba(0,0,0,0.06);
        --shadow-lg: rgba(0,0,0,0.12);
        --header-bg: rgba(255,255,255,0.92);
        --nav-active: #4F6CF7;
        --badge-bg: #4F6CF7;
        --badge-text: #fff;
        --badge-unread: #E85656;
        --badge-unread-text: #fff;
        --scrollbar-thumb: #C8C9D6;
        --sidebar-header-border: #DCDEE8;
        --toggle-bg-off: #C8C9D6;
        --toggle-bg-on: #4F6CF7;
        --mention-bg: #EDF2FF;
        --gradient-btn: linear-gradient(135deg, #4F6CF7, #3B55D0);
      }

      [data-theme="dark"] {
        --bg: #111118;
        --sidebar-bg: #16161E;
        --surface: #1A1A24;
        --surface-hover: #22222E;
        --surface-active: #1E2240;
        --text: #E8E8F0;
        --text-secondary: #8A8A9A;
        --text-muted: #5A5A6A;
        --border: #2A2A36;
        --border-light: #22222E;
        --primary: #6B85F7;
        --secondary: #8A9AAA;
        --accent: #6B85F7;
        --accent-light: #1E2240;
        --bubble-own: #222A44;
        --bubble-own-border: #323A60;
        --bubble-other: #1A1A24;
        --bubble-other-border: #2A2A36;
        --input-bg: #22222E;
        --danger: #F06060;
        --success: #3BCB6E;
        --online-dot: #4ADE80;
        --shadow: rgba(0,0,0,0.3);
        --shadow-lg: rgba(0,0,0,0.45);
        --header-bg: rgba(22,22,30,0.94);
        --nav-active: #6B85F7;
        --badge-bg: #6B85F7;
        --badge-text: #fff;
        --badge-unread: #F06060;
        --badge-unread-text: #fff;
        --scrollbar-thumb: #3A3A4A;
        --sidebar-header-border: #2A2A36;
        --toggle-bg-off: #3A3A4A;
        --toggle-bg-on: #6B85F7;
        --mention-bg: #1E2240;
        --gradient-btn: linear-gradient(135deg, #6B85F7, #4F6CF7);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', system-ui, 'Segoe UI', sans-serif;
        background: var(--bg);
        background-attachment: fixed;
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
      @keyframes msgSlideIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes typingDot {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
